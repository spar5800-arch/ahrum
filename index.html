<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>아름[♡] 갠방/엑셀 시그 목록</title>
  <style>
    :root{
      /* 핑크 테마 변수 */
      --bg1:#fff5f7;
      --bg2:#ffe4e9;
      --card:#ffffff;
      --line:#ffd1dc;
      --text:#4a353a;
      --muted:#8e747a;
      --accent:#ff6b9d; /* 메인 핑크 */
      --accent2:#ffb3c6;
      --shadow: 0 14px 40px rgba(255, 107, 157, 0.15);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Noto Sans KR", sans-serif;
      color: var(--text);
      /* 핑크빛 그라데이션 배경 */
      background: radial-gradient(1200px 600px at 20% -10%, #fff0f3, transparent 60%),
                  radial-gradient(900px 500px at 110% 10%, #ffe5ec, transparent 55%),
                  linear-gradient(180deg, var(--bg1), #ffffff);
      padding: 48px 16px;
    }

    .wrap{
      max-width: 860px;
      margin: 0 auto;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header{
      padding: 22px 22px 14px;
      border-bottom: 2px solid var(--bg2);
      display: grid;
      gap: 12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 14px;
    }

    .brand img{
      width: 120px;
      height: auto;
      display:block;
      border-radius: 12px;
      border: 2px solid var(--accent2);
      background: #fff;
    }

    h1{
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.3px;
      color: var(--accent);
      line-height: 1.25;
      text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
    }
